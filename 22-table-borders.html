<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>HTML Table Borders</title>

    <style>

        table, th, td {
            border: 1px solid black;
        }

    </style>

</head>

<body>

    <h1>Lección 22 - HTML Table Borders</h1>

    <table>

        <tr>
            <th>Habitación</th>
            <th>Precio</th>
            <th>Estado</th>
        </tr>

        <tr>
            <td>Sencilla</td>
            <td>Q350</td>
            <td>Disponible</td>
        </tr>

        <tr>
            <td>Doble</td>
            <td>Q500</td>
            <td>Ocupada</td>
        </tr>

    </table>

</body>

</html>
