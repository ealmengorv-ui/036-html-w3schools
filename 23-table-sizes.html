<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>HTML Table Sizes</title>

    <style>

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid black;
        }

    </style>

</head>

<body>

    <h1>Lección 23 - HTML Table Sizes</h1>

    <table>

        <tr>
            <th>Habitación</th>
            <th>Precio</th>
            <th>Estado</th>
        </tr>

        <tr>
            <td>Sencilla</td>
            <td>Q350</td>
            <td>Disponible</td>
        </tr>

        <tr>
            <td>Doble</td>
            <td>Q500</td>
            <td>Ocupada</td>
        </tr>

        <tr>
            <td>Suite</td>
            <td>Q850</td>
            <td>Disponible</td>
        </tr>

    </table>

</body>

</html>
