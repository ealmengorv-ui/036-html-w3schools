<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>HTML Form Elements</title>
</head>

<body>

    <h1>Lección 48 - HTML Form Elements</h1>

    <form>

        <label for="nombre">Nombre:</label>
        <input
            type="text"
            id="nombre">

        <br><br>

        <label for="pais">País:</label>

        <select id="pais">

            <option>Guatemala</option>
            <option>México</option>
            <option>El Salvador</option>
            <option>Honduras</option>

        </select>

        <br><br>

        <label for="comentario">Comentario:</label>

        <br>

        <textarea
            id="comentario"
            rows="5"
            cols="35"></textarea>

        <br><br>

        <button>
            Enviar información
        </button>

    </form>

</body>

</html>
