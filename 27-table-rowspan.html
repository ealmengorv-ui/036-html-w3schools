<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>HTML Table Rowspan</title>

    <style>

        table {
            width: 60%;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid black;
            padding: 10px;
        }

    </style>

</head>

<body>

    <h1>Lección 27 - HTML Table Rowspan</h1>

    <table>

        <tr>
            <th rowspan="2">Tipo</th>
            <td>Sencilla</td>
        </tr>

        <tr>
            <td>Doble</td>
        </tr>

    </table>

</body>

</html>
