<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>HTML Table Colspan</title>

    <style>

        table {
            width: 60%;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid black;
            padding: 10px;
        }

    </style>

</head>

<body>

    <h1>Lección 26 - HTML Table Colspan</h1>

    <table>

        <tr>
            <th colspan="2">Información del Hotel</th>
        </tr>

        <tr>
            <th>Habitación</th>
            <th>Precio</th>
        </tr>

        <tr>
            <td>Sencilla</td>
            <td>Q350</td>
        </tr>

        <tr>
            <td>Doble</td>
            <td>Q500</td>
        </tr>

    </table>

</body>

</html>
