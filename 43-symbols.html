<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>HTML Symbols</title>
</head>

<body>

    <h1>Lección 43 - HTML Symbols</h1>

    <h2>Símbolos matemáticos</h2>

    <p>Suma: &plus;</p>
    <p>Multiplicación: &times;</p>
    <p>División: &divide;</p>
    <p>Infinito: &infin;</p>

    <h2>Símbolos monetarios</h2>

    <p>Dólar: &dollar;</p>
    <p>Euro: &euro;</p>
    <p>Libra esterlina: &pound;</p>
    <p>Yen: &yen;</p>

</body>

</html>
