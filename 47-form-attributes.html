<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>HTML Form Attributes</title>

</head>

<body>

    <h1>Lección 47 - HTML Form Attributes</h1>

    <form action="respuesta.html" method="get">

        <label for="nombre">Nombre:</label>
        <input
            type="text"
            id="nombre"
            name="nombre">

        <br><br>

        <label for="correo">Correo:</label>
        <input
            type="email"
            id="correo"
            name="correo">

        <br><br>

        <input
            type="submit"
            value="Enviar">

    </form>

</body>

</html>
