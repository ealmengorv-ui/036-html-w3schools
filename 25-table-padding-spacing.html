<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>HTML Table Padding & Spacing</title>

    <style>

        table {
            width: 60%;
            border: 1px solid black;
            border-spacing: 10px;
        }

        th, td {
            border: 1px solid black;
            padding: 15px;
        }

    </style>

</head>

<body>

    <h1>Lección 25 - HTML Table Padding & Spacing</h1>

    <table>

        <tr>
            <th>Habitación</th>
            <th>Precio</th>
        </tr>

        <tr>
            <td>Sencilla</td>
            <td>Q350</td>
        </tr>

        <tr>
            <td>Doble</td>
            <td>Q500</td>
        </tr>

    </table>

</body>

</html>
