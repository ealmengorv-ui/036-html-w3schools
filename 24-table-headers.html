<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>HTML Table Headers</title>

    <style>

        table {
            width: 60%;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid black;
            padding: 8px;
        }

    </style>

</head>

<body>

    <h1>Lección 24 - HTML Table Headers</h1>

    <table>

        <tr>
            <th>Habitación</th>
            <td>Sencilla</td>
        </tr>

        <tr>
            <th>Precio</th>
            <td>Q350</td>
        </tr>

        <tr>
            <th>Estado</th>
            <td>Disponible</td>
        </tr>

    </table>

</body>

</html>
