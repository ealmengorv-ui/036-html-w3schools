<!DOCTYPE html>
<html>
<head>
    <title>Formato de texto HTML</title>
</head>
<body>

    <h1>Formato de texto HTML</h1>

    <p><b>Este texto está en negrita.</b></p>

    <p><strong>Este texto es importante.</strong></p>

    <p><i>Este texto está en cursiva.</i></p>

    <p><em>Este texto está enfatizado.</em></p>

    <p><mark>Este texto está resaltado.</mark></p>

    <p><small>Este texto es más pequeño.</small></p>

    <p><del>Este texto fue eliminado.</del></p>

    <p><ins>Este texto fue insertado.</ins></p>

    <p>La fórmula del agua es H<sub>2</sub>O.</p>

    <p>2<sup>3</sup> = 8.</p>

</body>
</html>
