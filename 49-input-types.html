<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>HTML Input Types</title>

</head>

<body>

    <h1>Lección 49 - HTML Input Types</h1>

    <form>

        <label>Nombre:</label><br>
        <input type="text">

        <br><br>

        <label>Contraseña:</label><br>
        <input type="password">

        <br><br>

        <label>Correo electrónico:</label><br>
        <input type="email">

        <br><br>

        <label>Edad:</label><br>
        <input type="number">

        <br><br>

        <label>Fecha de nacimiento:</label><br>
        <input type="date">

        <br><br>

        <label>Color favorito:</label><br>
        <input type="color">

        <br><br>

        <label>
            <input type="checkbox">
            Acepto los términos y condiciones
        </label>

        <br><br>

        <label>Género:</label><br>

        <input type="radio" name="genero">
        Masculino

        <br>

        <input type="radio" name="genero">
        Femenino

        <br><br>

        <input type="submit" value="Enviar">

    </form>

</body>

</html>
