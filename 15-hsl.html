<!DOCTYPE html>
<html>
<head>
    <title>Colores HSL y HSLA</title>
</head>
<body>

    <h1>Colores HSL y HSLA</h1>

    <h2>Ejemplos con HSL</h2>

    <p style="background-color:hsl(0, 100%, 50%);">
        Rojo - hsl(0,100%,50%)
    </p>

    <p style="background-color:hsl(120, 100%, 50%);">
        Verde - hsl(120,100%,50%)
    </p>

    <p style="background-color:hsl(240, 100%, 50%); color:white;">
        Azul - hsl(240,100%,50%)
    </p>

    <h2>Ejemplo de Luminosidad</h2>

    <p style="background-color:hsl(0,100%,25%); color:white;">
        Rojo oscuro
    </p>

    <p style="background-color:hsl(0,100%,75%);">
        Rojo claro
    </p>

    <h2>Ejemplo con HSLA</h2>

    <p style="background-color:hsla(240,100%,50%,0.5);">
        Azul con transparencia (Alpha = 0.5)
    </p>

</body>
</html>
