<!DOCTYPE html>
<html>
<head>
    <title>Estilos HTML</title>
</head>
<body>

    <h1>Estilos HTML</h1>

    <p style="color:red;">
        Este párrafo tiene el texto de color rojo.
    </p>

    <p style="background-color:lightblue;">
        Este párrafo tiene un fondo azul claro.
    </p>

    <p style="font-family:Arial;">
        Este texto utiliza la fuente Arial.
    </p>

    <p style="font-size:24px;">
        Este texto tiene un tamaño de 24 píxeles.
    </p>

    <p style="text-align:center;">
        Este texto está centrado.
    </p>

</body>
</html>
