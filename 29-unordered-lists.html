<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>HTML Unordered Lists</title>

</head>

<body>

    <h1>Lección 29 - HTML Unordered Lists</h1>

    <h2>Servicios del Hotel El Gran Chortí</h2>

    <ul>
        <li>WiFi gratuito</li>
        <li>Piscina</li>
        <li>Restaurante</li>
        <li>Parqueo privado</li>
    </ul>

    <h2>Áreas del hotel</h2>

    <ul style="list-style-type:square;">
        <li>Recepción</li>
        <li>Habitaciones</li>
        <li>Jardín</li>
        <li>Salón de eventos</li>
    </ul>

</body>

</html>
