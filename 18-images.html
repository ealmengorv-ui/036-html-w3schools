<!DOCTYPE html>
<html>
<head>
    <title>Imágenes HTML</title>
</head>
<body>

    <h1>Imágenes HTML</h1>

    <p>Imagen en tamaño original.</p>

    <img src="imagen.jpg" alt="Paisaje">

    <hr>

    <p>Imagen con ancho y alto definidos.</p>

    <img src="imagen.jpg"
         alt="Paisaje"
         width="300"
         height="200">

    <hr>

    <p>Imagen usando el atributo style.</p>

    <img src="imagen.jpg"
         alt="Paisaje"
         style="width:200px;height:150px;">

</body>
</html>
